<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Linux distributions</title>
  <desc id="desc">Cards for Linux distribution families</desc>
  <rect width="1200" height="760" fill="#0a0a0a"/>
  <text x="90" y="105" fill="#fafafa" font-family="Arial, sans-serif" font-size="48" font-weight="800">Linux 배포판 종류</text>
  <text x="92" y="150" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="24">Ubuntu, Debian, Fedora, AlmaLinux, Arch</text>
  <g fill="#18181b" stroke="#3f3f46" stroke-width="2">
    <rect x="90" y="220" width="300" height="190" rx="24"/>
    <rect x="450" y="220" width="300" height="190" rx="24"/>
    <rect x="810" y="220" width="300" height="190" rx="24"/>
    <rect x="270" y="470" width="300" height="190" rx="24"/>
    <rect x="630" y="470" width="300" height="190" rx="24"/>
  </g>
  <text x="130" y="300" fill="#22c55e" font-family="Arial, sans-serif" font-size="38" font-weight="800">Ubuntu</text>
  <text x="130" y="350" fill="#d4d4d8" font-family="Arial, sans-serif" font-size="22">초보자와 데스크톱</text>
  <text x="490" y="300" fill="#38bdf8" font-family="Arial, sans-serif" font-size="38" font-weight="800">Debian</text>
  <text x="490" y="350" fill="#d4d4d8" font-family="Arial, sans-serif" font-size="22">안정성과 서버</text>
  <text x="850" y="300" fill="#818cf8" font-family="Arial, sans-serif" font-size="38" font-weight="800">Fedora</text>
  <text x="850" y="350" fill="#d4d4d8" font-family="Arial, sans-serif" font-size="22">최신 기술 테스트</text>
  <text x="310" y="550" fill="#f59e0b" font-family="Arial, sans-serif" font-size="38" font-weight="800">AlmaLinux</text>
  <text x="310" y="600" fill="#d4d4d8" font-family="Arial, sans-serif" font-size="22">RHEL 계열 서버</text>
  <text x="670" y="550" fill="#f472b6" font-family="Arial, sans-serif" font-size="38" font-weight="800">Arch</text>
  <text x="670" y="600" fill="#d4d4d8" font-family="Arial, sans-serif" font-size="22">직접 구성하는 시스템</text>
</svg>
