<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Python installation</title>
  <desc id="desc">Python code editor and installer illustration</desc>
  <rect width="1200" height="760" fill="#eff6ff"/>
  <rect x="120" y="110" width="960" height="540" rx="30" fill="#172554"/>
  <rect x="170" y="170" width="480" height="420" rx="18" fill="#020617"/>
  <text x="205" y="230" fill="#93c5fd" font-family="Consolas, monospace" font-size="30">python --version</text>
  <text x="205" y="290" fill="#fef08a" font-family="Consolas, monospace" font-size="30">Python 3.13.x</text>
  <text x="205" y="370" fill="#86efac" font-family="Consolas, monospace" font-size="30">pip install requests</text>
  <text x="205" y="430" fill="#e5e7eb" font-family="Consolas, monospace" font-size="30">venv ready</text>
  <circle cx="810" cy="300" r="110" fill="#facc15"/>
  <circle cx="870" cy="380" r="110" fill="#2563eb" opacity="0.92"/>
  <text x="735" y="535" fill="#ffffff" font-family="Arial, sans-serif" font-size="46" font-weight="800">Python 설치</text>
  <text x="735" y="585" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="24">Windows PATH 설정 포함</text>
</svg>
